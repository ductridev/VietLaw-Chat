cases:
  - id: semantic_business_001_food_online
    title: Selling food online from home
    suite: semantic
    severity: blocker
    requirement_ids: [API-ANALYZE-001, RAG-SRC-003]
    tags: [smoke, business, food, metamorphic_base]
    metamorphic_group: business_food
    source_relevance_topic: food_business
    question: "Tôi muốn bán đồ ăn online ở quê thì cần giấy tờ gì?"
    expected:
      http_status: 200
      acceptable_domain: [household_business]
      acceptable_risk: [low, medium]
      acceptable_decision: [ask_clarifying_questions, answer_with_guidance]
      requires_sources: true
      allowed_source_ids:
        [business_registration_001, business_registration_002, business_registration_003,
         business_food_001, business_food_002, business_checklist_001]
      forbidden_source_ids: [business_safety_001, civil_deposit_001, traffic_law_001]
      must_not_include: ["cứ bán trước", "khi nào bị kiểm tra thì tính", "không cần đăng ký"]
      max_latency_ms: 15000

