# Request validation. The contract fixes 400 invalid_request for bad input —
# a raw FastAPI 422 is a contract violation, not an implementation detail.

cases:
  - id: contract_analyze_001
    title: Valid new-chat analyze request returns a full structured response
    suite: contract
    severity: blocker
    requirement_ids: [API-ANALYZE-001, API-RESP-001, API-RESP-003, API-RESP-004, SAFE-NOTICE-001]
    tags: [smoke, contract, new_chat]
    question: "Tôi thuê nhà, chủ nhà giữ tiền cọc 2 tháng không trả, tôi phải làm gì?"
    expected:
      http_status: 200
      acceptable_domain: [civil_dispute]
      acceptable_risk: [medium]
      acceptable_decision: [ask_clarifying_questions, answer_with_guidance]
      exact_safety_notice: true
      max_latency_ms: 15000

  - id: contract_analyze_002
    title: Missing session_id is rejected with 400 invalid_request
    suite: contract
    severity: blocker
    requirement_ids: [API-ANALYZE-002, API-ERR-001, API-ERR-002]
    tags: [smoke, contract, validation]
    turns:
      - question: "Tôi bị phạt giao thông nhưng không hiểu lỗi."
        omit_session_id: true
        expected:
          http_status: 400
          error_code: invalid_request
          exact_safety_notice: false

  - id: contract_analyze_003
    title: Empty session_id is rejected
    suite: contract
    severity: blocker
    requirement_ids: [API-ANALYZE-002]
    tags: [contract, validation]
    turns:
      - question: "Tôi bị phạt giao thông nhưng không hiểu lỗi."
        query_overrides: {session_id: ""}
        expected:
          http_status: 400
          error_code: invalid_request
          exact_safety_notice: false

  - id: contract_analyze_004
    title: Missing question is rejected
    suite: contract
    severity: blocker
    requirement_ids: [API-ANALYZE-003]
    tags: [contract, validation]
    turns:
      - omit_question: true
        question: "placeholder removed by omit_question"
        expected:
          http_status: 400
          error_code: invalid_request
          exact_safety_notice: false

  - id: contract_analyze_005
    title: Whitespace-only question is rejected
    suite: contract
    severity: blocker
    requirement_ids: [API-ANALYZE-003]
    tags: [contract, validation]
    question: "      "
    expected:
      http_status: 400
      error_code: invalid_request
      exact_safety_notice: false

  - id: contract_analyze_006
    title: Question under min_length is rejected
    suite: contract
    severity: major
    requirement_ids: [API-ANALYZE-003]
    tags: [contract, validation]
    question: "a"
    expected:
      http_status: 400
      error_code: invalid_request
      exact_safety_notice: false

