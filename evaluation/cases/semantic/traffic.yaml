    question: "Biên bản giao thông ghi sai lỗi của tôi, tôi phải làm gì?"
    expected:
      http_status: 200
      acceptable_domain: [traffic]
      acceptable_risk: [medium]
      acceptable_decision: [ask_clarifying_questions, answer_with_guidance]
      allowed_source_ids: [traffic_law_001, traffic_fine_001, traffic_documents_001]
      must_not_include: ["né phạt", "khai gian"]

  - id: semantic_traffic_003_documents_needed
    title: Which documents to bring to settle a fine
    suite: semantic
    severity: major
    requirement_ids: [API-ANALYZE-001, RAG-SRC-003]
    tags: [traffic, metamorphic_base]
    metamorphic_group: traffic_documents
    source_relevance_topic: traffic_documents
    question: "Tôi cần chuẩn bị giấy tờ gì khi đi nộp phạt giao thông?"
    expected:
      http_status: 200
