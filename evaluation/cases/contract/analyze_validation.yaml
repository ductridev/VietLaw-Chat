  - id: contract_analyze_008
    title: Invalid user_type is rejected
    suite: contract
    severity: major
    requirement_ids: [API-ANALYZE-005]
    tags: [contract, validation]
    turns:
      - question: "Tôi muốn bán đồ ăn online ở quê thì cần giấy tờ gì?"
        query_overrides: {user_type: "lawyer_bot"}
        expected:
          http_status: 400
          error_code: invalid_request
          exact_safety_notice: false

  - id: contract_analyze_009
    title: Malformed JSON body is rejected cleanly
    suite: contract
    severity: blocker
    requirement_ids: [API-ANALYZE-005, ROBUST-001, API-ERR-003]
    tags: [contract, validation, robustness]
    turns:
      - raw_body: '{"question": "Tôi bị phạt giao thông", "session_id": '
        expected:
          http_status: 400
          error_code: invalid_request
          exact_safety_notice: false

  - id: contract_analyze_010
    title: Non-JSON body is rejected cleanly
    suite: contract
    severity: major
    requirement_ids: [ROBUST-001, API-ERR-003]
    tags: [contract, validation, robustness]
    turns:
      - raw_body: "question=Tôi bị phạt giao thông&session_id=abc"
        raw_body_is_text: true
        expected:
          http_status: 400
          error_code: invalid_request
          exact_safety_notice: false

  - id: contract_analyze_011
    title: Wrong type for question (number) is rejected
    suite: contract
    severity: major
    requirement_ids: [ROBUST-001]
    tags: [contract, validation, robustness]
    turns:
      - question: "placeholder"
        query_overrides: {question: 12345}
        expected:
          http_status: 400
          error_code: invalid_request
          exact_safety_notice: false

  - id: contract_analyze_012
    title: Valid no-diacritics Vietnamese input is accepted as Vietnamese
    suite: contract
    severity: blocker
    requirement_ids: [API-ANALYZE-006, SAFE-UNSAFE-002]
    tags: [contract, no_diacritics]
    question: "toi thue nha chu nha giu tien coc khong tra"
    expected:
      http_status: 200
      acceptable_domain: [civil_dispute]
      acceptable_risk: [medium]
      acceptable_decision: [ask_clarifying_questions, answer_with_guidance]
      must_not_match: ["only supports Vietnamese", "chỉ hỗ trợ câu hỏi pháp lý bằng tiếng Việt"]

  - id: contract_analyze_013
    title: Over-long session_id (>128) is rejected
    suite: contract
    severity: major
    requirement_ids: [API-ANALYZE-002]
    tags: [contract, validation]
    turns:
      - question: "Tôi bị phạt giao thông nhưng không hiểu lỗi."
        query_overrides:
          session_id: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
        expected:
          http_status: 400
          error_code: invalid_request
          exact_safety_notice: false

  - id: contract_analyze_014
    title: Unknown chat_id returns 404 chat_not_found, not a new chat
    suite: contract
    severity: blocker
    requirement_ids: [API-ERR-002, SESSION-002]
    tags: [contract, validation, session]
    turns:
      - question: "Tôi bị phạt giao thông nhưng không hiểu lỗi."
        chat_id: "chat_does_not_exist_zzz"
        expected:
          http_status: 404
          error_code: chat_not_found
          exact_safety_notice: false

  - id: contract_analyze_015
    title: Error envelope carries the safety notice
    suite: contract
    severity: blocker
    requirement_ids: [SAFE-NOTICE-002, API-ERR-001]
    tags: [contract, validation, safety]
    turns:
      - question: "Tôi bị phạt giao thông nhưng không hiểu lỗi."
        omit_session_id: true
        expected:
          http_status: 400
          error_code: invalid_request
          exact_safety_notice: false

