# Requirement catalogue, extracted from the frozen specs. Every curated case
# cites at least one id. Anything here with no case is reported as a coverage
# gap — including the requirements this harness deliberately cannot test.

requirements:
  # --- health (api_contract.md §19)
  - id: API-HEALTH-001
    description: GET /api/health returns status, service, contract_version and readiness flags.
  - id: API-HEALTH-002
    description: Health reports degraded when RAG/safety/chat store is not ready; never calls the LLM.

  # --- analyze request validation (api_contract.md §10.3)
  - id: API-ANALYZE-001
    description: POST /api/analyze accepts a valid request and returns a structured response.
  - id: API-ANALYZE-002
    description: Missing/invalid session_id returns 400 invalid_request.
  - id: API-ANALYZE-003
    description: Missing/blank/oversized question returns 400 invalid_request.
  - id: API-ANALYZE-004
    description: Omitted chat_id creates a new chat owned by session_id; chat_id is never null.
  - id: API-ANALYZE-005
    description: Invalid user_type or malformed JSON returns 400, never a raw 422.
  - id: API-ANALYZE-006
    description: Vietnamese without diacritics is treated as Vietnamese, not as English.

  # --- response contract (api_contract.md §10.5, §10.6)
  - id: API-RESP-001
    description: Response carries all 16 required envelope fields with contract_version v1.
  - id: API-RESP-002
    description: domain, risk_level and decision are drawn from the supported enums.
  - id: API-RESP-003
    description: confidence contains exactly domain, risk and answer.
  - id: API-RESP-004
    description: user_message_id and assistant_message_id are always present and non-null.

  # --- language (api_contract.md §10.4)
  - id: API-LANG-001
    description: Clear English input returns HTTP 200 with decision unsupported, not an error.
  - id: API-LANG-002
    description: unsupported_language is not an error code; unsupported language is a normal response.

  # --- sources (api_contract.md §11, rag_spec.md §12)
  - id: RAG-SRC-001
    description: Every source object comes from the curated corpus; ids, URLs and titles are never invented.
  - id: RAG-SRC-002
    description: Deprecated snippets are never returned.
  - id: RAG-SRC-003
    description: Retrieved sources are topically relevant, not merely same-domain.
  - id: RAG-SRC-004
    description: Retrieval respects top-k.
  - id: RAG-NOSRC-001
    description: No relevant source returns sources[] with HTTP 200 and cautious wording.
  - id: RAG-NOSRC-002
    description: With zero sources the answer makes no strong legal claim.
  - id: RAG-CITE-001
    description: used_source_ids is a subset of retrieved ids; citation guard rejects the rest.

  # --- safety (safety_policy.md)
  - id: SAFE-NOTICE-001
    description: Every successful response includes the exact safety notice text.
  - id: SAFE-NOTICE-002
    description: Error responses also include the safety notice.
  - id: SAFE-UNSAFE-001
    description: Unsafe intent gives domain high_risk, risk high, decision refuse_unsafe_request.
  - id: SAFE-UNSAFE-002
    description: Unsafe detection is accent-insensitive and works without diacritics.
  - id: SAFE-UNSAFE-003
    description: Nearby negation words do not exempt an unsafe request from detection.
  - id: SAFE-UNSAFE-004
    description: Unsafe detection runs per turn; a prior safe turn never softens a later unsafe one.
  - id: SAFE-OUT-001
    description: Generated output contains no actionable evasion/evidence-hiding/forgery instructions.
  - id: SAFE-OUT-002
    description: No response guarantees an outcome or says a lawyer is unnecessary.
  - id: SAFE-ESC-001
    description: High-risk non-unsafe matters escalate to recommend_professional_help.
  - id: SAFE-FP-001
    description: Lawful questions (complaint, appeal, registration) are not refused as unsafe.

  # --- session ownership (api_contract.md §8.1)
  - id: SESSION-001
    description: A chat created via analyze is always linked to a session; orphan chats are forbidden.
  - id: SESSION-002
    description: Analyze with another session's chat_id returns 404 chat_not_found.
  - id: SESSION-003
    description: Chat detail for another session's chat returns 404 chat_not_found.
  - id: SESSION-004
    description: Chat delete for another session's chat returns 404 chat_not_found.
  - id: SESSION-005
    description: The 404 never reveals the owning session id.
  - id: SESSION-006
    description: Chat list only returns chats belonging to the supplied session.
  - id: SESSION-007
    description: A deleted chat cannot be reused or read.

  # --- chat storage (api_contract.md §9, §13)
  - id: CHAT-STORE-001
    description: The user message and the structured assistant message are both persisted.
  - id: CHAT-STORE-002
    description: Messages sort ascending by created_at, then by message_id.
  - id: CHAT-STORE-003
    description: Assistant content_json carries all 11 AnalyzeContent fields.
  - id: CHAT-STORE-004
    description: Reloading a chat reproduces the live response exactly.
  - id: CHAT-STORE-005
    description: POST /api/chats creates a chat; GET lists; DELETE soft-deletes.
  - id: CHAT-CONTEXT-001
    description: A follow-up in the same chat uses that chat's history.
  - id: CHAT-CONTEXT-002
    description: A fresh chat has no context from any earlier chat.
  - id: CHAT-CONTEXT-003
    description: A topic switch inside one chat follows the current turn's intent.

  # --- errors (api_contract.md §14)
  - id: API-ERR-001
    description: Errors use the {code,message} envelope with contract_version and safety_notice.
  - id: API-ERR-002
    description: chat_not_found is 404; invalid_request is 400.
  - id: API-ERR-003
    description: No stack trace, provider error, prompt or API key reaches the client.

  # --- robustness
  - id: ROBUST-001
    description: Malformed JSON, wrong types and oversized payloads produce a clean 400.
  - id: ROBUST-002
    description: Prompt injection cannot change the contract, invent sources or drop the safety notice.
  - id: ROBUST-003
    description: HTML/script/control characters in user text are treated as inert data.

  # --- performance
  - id: PERF-001
    description: p95 analyze latency stays within budget under the MVP load profile.
  - id: PERF-002
    description: Concurrent requests to different chats do not interfere.
  - id: PERF-003
    description: Concurrent writes to one chat keep message ordering intact.

  # --- known-untestable through a black-box HTTP boundary
  - id: AI-CORE-001
    description: >
      The AI Core never sends full raw chat history to the LLM (ai_core_spec context rules).
      NOT TESTABLE over HTTP: no observable signal distinguishes a bounded context window
      from a full-history prompt. Requires code review or a backend-provided metadata field.
  - id: AI-CORE-002
    description: >
      Safety Guard may escalate but never downgrade risk. Only partially observable: the
      harness sees the final response, not the pre-guard values. Requires code review.
