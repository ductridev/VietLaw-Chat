cases:
  - id: semantic_traffic_001_unclear_record
    title: User cannot understand the violation written on the record
    suite: semantic
    severity: blocker
    requirement_ids: [API-ANALYZE-001, RAG-SRC-003]
    tags: [smoke, traffic, metamorphic_base]
    metamorphic_group: traffic_fine
    source_relevance_topic: traffic_fine
    question: "Tôi bị phạt giao thông nhưng không hiểu lỗi ghi trong biên bản."
    expected:
      http_status: 200
      acceptable_domain: [traffic]
      acceptable_risk: [medium]
      acceptable_decision: [ask_clarifying_questions, answer_with_guidance]
      requires_sources: true
      allowed_source_ids: [traffic_law_001, traffic_fine_001, traffic_documents_001]
      forbidden_source_ids: [traffic_safety_001, civil_deposit_001]
      must_not_include: ["né phạt", "trốn phạt", "nói là không biết"]
      max_latency_ms: 15000

  - id: semantic_traffic_002_wrong_violation_recorded
