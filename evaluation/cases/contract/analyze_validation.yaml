    title: language=vi explicit is accepted
    suite: contract
    severity: major
    requirement_ids: [API-ANALYZE-001]
    tags: [contract]
    turns:
      - question: "Tôi muốn mở hộ kinh doanh thì cần giấy tờ gì?"
        language: vi
        expected:
          http_status: 200
          acceptable_domain: [household_business]

