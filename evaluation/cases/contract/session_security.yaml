# Session isolation. In the no-login MVP, chat_id is NOT an authorization
# credential (api_contract.md §8.1). Every attacker turn below reuses a real
# chat_id from another session — the only correct answer is 404, with no hint
# about who owns the chat.
#
# Scope note for the report: session_id is a demo identifier, not authentication.
# Passing this suite means the backend enforces the MVP's isolation rule; it does
# not mean the product has an auth model.

cases:
  - id: session_001_analyze_wrong_session
    title: Analyze against another session's chat_id returns 404
    suite: session
    severity: blocker
    requirement_ids: [SESSION-002, API-ERR-002, SESSION-005]
    tags: [smoke, session, security]
    turns:
      - question: "Tôi thuê nhà, chủ nhà giữ tiền cọc không trả."
        session: fresh
        expected:
          http_status: 200
          acceptable_domain: [civil_dispute]
      - question: "Cho tôi xem lại nội dung vụ việc này."
        session: attacker
        chat_id: "$prev"
        expected:
          http_status: 404
          error_code: chat_not_found
          exact_safety_notice: false

  - id: session_002_detail_wrong_session
    title: Chat detail for another session's chat returns 404 and leaks nothing
    suite: session
    severity: blocker
    requirement_ids: [SESSION-003, SESSION-005]
    tags: [smoke, session, security]
    turns:
      - question: "Tôi thuê nhà, chủ nhà giữ tiền cọc không trả."
        session: fresh
        expected:
          http_status: 200
      - op: chat_detail
        session: attacker
        chat_id: "$prev"
        expected:
          http_status: 404
          error_code: chat_not_found
          exact_safety_notice: false

  - id: session_003_delete_wrong_session
    title: Deleting another session's chat returns 404
    suite: session
    severity: blocker
    requirement_ids: [SESSION-004, SESSION-005]
    tags: [session, security]
    turns:
      - question: "Bạn tôi vay tiền không trả, tôi cần làm gì?"
        session: fresh
        expected:
          http_status: 200
      - op: chat_delete
        session: attacker
        chat_id: "$prev"
        expected:
          http_status: 404
          error_code: chat_not_found
          exact_safety_notice: false

  - id: session_004_owner_still_has_access
    title: After an attacker probe, the owner can still read the chat
    suite: session
    severity: blocker
    requirement_ids: [SESSION-003, SESSION-006]
    tags: [session, security]
    turns:
      - question: "Tôi thuê nhà, chủ nhà giữ tiền cọc không trả."
        session: fresh
        expected:
          http_status: 200
      - op: chat_detail
        session: attacker
        chat_id: "$prev"
        expected:
          http_status: 404
          exact_safety_notice: false
      - op: chat_detail
        session: same
        chat_id: "$prev"
        expected:
          http_status: 200
          exact_safety_notice: false

  - id: session_005_list_is_session_scoped
    title: An attacker's chat list never contains another session's chat
    suite: session
    severity: blocker
    requirement_ids: [SESSION-006]
    tags: [session, security]
    turns:
      - question: "Tôi bị phạt giao thông nhưng không hiểu lỗi ghi trong biên bản."
        session: fresh
        expected:
          http_status: 200
      - op: chat_list
        session: attacker
        expected:
          http_status: 200
          exact_safety_notice: false

  - id: session_006_deleted_chat_cannot_be_reused
    title: A soft-deleted chat cannot be used for a follow-up
    suite: session
    severity: blocker
    requirement_ids: [SESSION-007, CHAT-STORE-005]
    tags: [session, security, persistence]
    turns:
      - question: "Tôi thuê nhà, chủ nhà giữ tiền cọc không trả."
        session: fresh
        expected:
          http_status: 200
      - op: chat_delete
        session: same
        chat_id: "$prev"
        expected:
          http_status: 200
          exact_safety_notice: false
      - question: "Vậy tôi cần chuẩn bị giấy tờ gì?"
        session: same
        chat_id: "$prev"
        expected:
          http_status: 404
          error_code: chat_not_found
          exact_safety_notice: false

  - id: session_007_deleted_chat_detail_404
    title: A soft-deleted chat is not readable
    suite: session
    severity: blocker
    requirement_ids: [SESSION-007]
    tags: [session, persistence]
    turns:
      - question: "Tôi muốn bán đồ ăn online ở quê thì cần giấy tờ gì?"
        session: fresh
        expected:
          http_status: 200
      - op: chat_delete
        session: same
        chat_id: "$prev"
        expected:
          http_status: 200
          exact_safety_notice: false
      - op: chat_detail
        session: same
        chat_id: "$prev"
        expected:
          http_status: 404
          error_code: chat_not_found
          exact_safety_notice: false

  - id: session_008_deleted_chat_not_listed
    title: A soft-deleted chat disappears from the owner's list
    suite: session
    severity: major
    requirement_ids: [CHAT-STORE-005, SESSION-006]
    tags: [session, persistence]
    turns:
      - question: "Tôi muốn mở hộ kinh doanh, cần giấy tờ gì?"
        session: fresh
        expected:
          http_status: 200
      - op: chat_delete
        session: same
        chat_id: "$prev"
        expected:
          http_status: 200
          exact_safety_notice: false
      - op: chat_list
        session: same
        expected:
          http_status: 200
          exact_safety_notice: false

  - id: session_009_random_chat_id_detail
    title: A random chat id returns 404, not 500
    suite: session
    severity: blocker
    requirement_ids: [API-ERR-002, SESSION-003]
    tags: [session, security]
    turns:
      - op: chat_detail
        session: fresh
        chat_id: "chat_2f9a11ce_not_real"
        expected:
          http_status: 404
          error_code: chat_not_found
          exact_safety_notice: false

  - id: session_010_missing_session_on_detail
    title: Chat detail without session_id is a 400, not a 404
    suite: session
    severity: blocker
    requirement_ids: [SESSION-003, API-ERR-001]
    tags: [session, validation]
    turns:
      - question: "Tôi thuê nhà, chủ nhà giữ tiền cọc không trả."
        session: fresh
        expected:
          http_status: 200
      - op: chat_detail
        session: same
        chat_id: "$prev"
        omit_session_id: true
        expected:
          http_status: 400
          error_code: invalid_request
          exact_safety_notice: false

  - id: session_011_missing_session_on_list
    title: Chat list without session_id is a 400
    suite: session
    severity: blocker
    requirement_ids: [SESSION-006, API-ERR-001]
    tags: [session, validation]
    turns:
      - op: chat_list
        session: fresh
        omit_session_id: true
        expected:
          http_status: 400
          error_code: invalid_request
          exact_safety_notice: false

  - id: session_012_unicode_session_id
    title: A Unicode session_id is handled without a server error
    suite: session
    severity: major
    requirement_ids: [SESSION-001, ROBUST-001]
    tags: [session, robustness]
    turns:
      - question: "Tôi bị phạt giao thông nhưng không hiểu lỗi."
        query_overrides: {session_id: "phiên-làm-việc-🇻🇳-001"}
        expected:
          http_status: 200
          acceptable_domain: [traffic]

  - id: session_013_new_chat_per_request
    title: Two analyze calls without chat_id create two different chats
    suite: session
    severity: blocker
    requirement_ids: [API-ANALYZE-004, CHAT-CONTEXT-002]
    tags: [session, new_chat]
    turns:
      - question: "Tôi thuê nhà, chủ nhà giữ tiền cọc không trả."
        session: fresh
        expected:
          http_status: 200
      - question: "Tôi bị phạt giao thông nhưng không hiểu lỗi."
        session: same
        expected:
          http_status: 200
          requires_new_chat: true
          acceptable_domain: [traffic]
