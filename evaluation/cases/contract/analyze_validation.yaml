    title: user_type household_business is accepted
    suite: contract
    severity: major
    requirement_ids: [API-ANALYZE-001]
    tags: [contract]
    user_type: household_business
    question: "Tôi muốn đăng ký hộ kinh doanh bán đồ ăn thì cần giấy tờ gì?"
    expected:
      http_status: 200
      acceptable_domain: [household_business]
